# Configuración de MongoDB Atlas
# IMPORTANTE: Este archivo contiene credenciales sensibles y NO debe ser commitido a git
# Agregarlo a .gitignore si no está ya incluido

# Connection String de MongoDB Atlas
# Formato: mongodb+srv://usuario:contraseńa@cluster.mongodb.net/?retryWrites=true&w=majority
MONGODB_URI=mongodb+srv://usuario:contraseńa@cluster.mongodb.net/?retryWrites=true&w=majority

# Nombre de la base de datos
MONGODB_DATABASE=practicasimon

# Nombre de la colección
MONGODB_COLLECTION=records

# API Key de MongoDB (si se usa para REST API)
MONGODB_API_KEY=

# ID de Aplicación de Realm (si se usa MongoDB Realm SDK)
REALM_APP_ID=

