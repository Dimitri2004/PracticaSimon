name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # ¡ESTA ES LA SOLUCIÓN! 
    # Le decimos a todos los pasos que se ejecuten dentro de la carpeta anidada.
    defaults:
      run:
        working-directory: ./PracticaSimon

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    # Este comando ahora se ejecutará dentro de ./PracticaSimon, donde sí encontrará el gradlew
    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest
